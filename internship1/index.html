<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="art">Art</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">
    <img src="C:\Internship1\image\nature_1.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_2.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_3.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_4.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_5.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_6.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_7.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_8.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\nature_9.jpg" alt="Nature" data-category="nature">
     <img src="C:\Internship1\image\city_1.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_2.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_3.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_4.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_5.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_6.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_7.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_8.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\city_9.jpg" alt="City" data-category="city">
     <img src="C:\Internship1\image\art_1.jpg" alt="Art" data-category="art">
     <img src="C:\Internship1\image\art_2.jpg" alt="Art" data-category="art">
     <img src="C:\Internship1\image\art_3.jpg" alt="Art" data-category="art">
     <img src="C:\Internship1\image\art_4.jpg" alt="Art" data-category="art">
      <img src="C:\Internship1\image\art_5.jpg" alt="Art" data-category="art">
       <img src="C:\Internship1\image\art_6.jpg" alt="Art" data-category="art">
        <img src="C:\Internship1\image\art_7.jpg" alt="Art" data-category="art">
         <img src="C:\Internship1\image\art_8.jpg" alt="Art" data-category="art">
          <img src="C:\Internship1\image\art_9.jpg" alt="Art" data-category="art">
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <span id="close">&times;</span>
    <img id="lightbox-img">
    <div id="caption"></div>
    <button id="prev">&#10094;</button>
    <button id="next">&#10095;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
